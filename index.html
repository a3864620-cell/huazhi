<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華芝商業機器 - 印量管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" onerror="document.getElementById('root').innerHTML='<h2 style=color:red>❌ React 載入失敗，請檢查網路連線</h2>'"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" onerror="document.getElementById('root').innerHTML='<h2 style=color:red>❌ ReactDOM 載入失敗</h2>'"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.2/babel.min.js" onerror="document.getElementById('root').innerHTML='<h2 style=color:red>❌ Babel 載入失敗</h2>'"></script>
</head>
<body style="margin:0; padding:0; background-color:#F5F3EE; font-family:'新細明體', 'PMingLiU', serif;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // ⚙️ Apps Script 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbxqBvxJAmyw3oef6XKi8MFNVe7Xl9qXW1Epk_RgpHxbEdqiO0MGE1IJrDK3R0DRcJXw/exec";

        const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
        const now = new Date();
        const CY = now.getFullYear() - 1911;

        const C = { bg:"#F5F3EE", navy:"#1A2744", accent:"#C8973A", light:"#E8E3D9", text:"#2C2C2C", muted:"#7A7A7A", danger:"#C0392B", success:"#1E6B45", blue:"#2A4A9A", blueBg:"#EEF3FF", blueBorder:"#B0C4F0", orange:"#9A6000", orangeBg:"#FFF7ED", orangeBorder:"#F0C070" };
        const btnS = (v="primary",x={}) => ({ padding:"10px 20px", borderRadius:4, border:"none", cursor:"pointer", fontFamily:"'新細明體', 'PMingLiU', serif", fontSize:14, fontWeight:"bold", letterSpacing:1, background:v==="primary"?C.navy:v==="accent"?C.accent:v==="red"?C.danger:C.light, color:v==="light"?C.text:"#FFF", ...x });
        const inp = (x={}) => ({ padding:"8px 12px", borderRadius:3, border:"1px solid "+C.light, fontFamily:"'新細明體', 'PMingLiU', serif", fontSize:14, width:"100%", boxSizing:"border-box", background:"#FAFAF8", ...x });
        const lbl = { fontSize:11, color:C.muted, letterSpacing:.5, marginBottom:4, display:"block" };
        
        const PRINT_CSS = `
          @media print {
            body * { visibility: hidden !important; }
            #print-area, #print-area * { visibility: visible !important; }
            #print-area {
              position: absolute !important; left: 0 !important; top: 0 !important;
              width: 100% !important; max-width: 100% !important;
              padding: 10mm !important; margin: 0 !important;
              box-sizing: border-box !important; box-shadow: none !important;
              font-family: '新細明體', 'PMingLiU', serif !important;
              -webkit-print-color-adjust: exact !important;
              print-color-adjust: exact !important;
            }
            #print-area * { font-weight: bold !important; }
            @page { margin: 10mm; }
          }
        `;
        
        function injectPrint(){ if(!document.getElementById("dp")){ const s=document.createElement("style");s.id="dp";s.textContent=PRINT_CSS;document.head.appendChild(s); } }

        // 修正時區問題：Google Sheets 回傳的日期可能是 UTC ISO 字串，直接 substring 會少一天
        function fixDate(str) {
          if (!str) return "";
          const s = String(str);
          // 純 YYYY-MM-DD，直接回傳
          if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
          // 含時區的 ISO 字串，用本地時間重新組合，避免 UTC 偏移造成日期少一天
          const d = new Date(s);
          if (isNaN(d.getTime())) return s.substring(0, 10);
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${y}-${m}-${day}`;
        }

        function safeParse(val, fallback) {
            if (typeof val === 'string') {
                try { return JSON.parse(val); } catch(e) { return fallback; }
            }
            return val || fallback;
        }

        function calcFee(cur,prev,quota,price,deduct=0, cycle=1){
          const safeCur = Number(cur) || 0;
          const safePrev = Number(prev) || 0;
          const safeQuota = Number(quota) || 0;
          const safePrice = Number(price) || 0;
          const safeDeduct = Number(deduct) || 0;
          const safeCycle = Number(cycle) || 1;
          
          const raw = Math.max(0, safeCur - safePrev);
          const actual = Math.max(0, raw - safeDeduct);
          const totalQuota = safeQuota * safeCycle;
          const over = Math.max(0, actual - totalQuota);
          
          return {raw, actual, over, fee: Math.round(over * safePrice)}; 
        }
        
        const emptyMachine = () => ({ id: Date.now()+Math.random(), type: "color", model: "", baseRent: "", rentNote: "", bwCur: "", bwPrev: "", bwQuota: "", bwPrice:"0.35", bwDeduct: "", bwDeductNote: "", colCur: "", colPrev: "", colQuota: "", colPrice:"3.5", colDeduct: "", colDeductNote: "", machineSwapped:false, bwNewInit:"", bwNewCur:"", colNewInit:"", colNewCur:"" });

        function emptyForm(){
          return { clientId:"", clientName:"", taxMode:"未稅", overageTaxMode:"未稅", billingYear:String(CY), billingMonth:String(now.getMonth()+1), billingCycle:"1", rentCycle:"", bw2colConvert:false, bw2colRatio:"10", bw2colMultiMode:"perMachine", periodStart:"", periodEnd:"", baseRent:"", rentNote:"", mode:"single", machineType:"color", multiCalcMode:"pooled", model:"", bwPrev:"", bwCur:"", bwQuota:"", bwPrice:"0.35", bwDeduct:"", bwDeductNote:"", colPrev:"", colCur:"", colQuota:"", colPrice:"3.5", colDeduct:"", colDeductNote:"", mBwPrice:"0.35", mColPrice:"3.5", machines:[emptyMachine()], machineSwapped:false, bwNewInit:"", bwNewCur:"", colNewInit:"", colNewCur:"" };
        }

        async function api(action, body={}) {
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), 25000); // 25秒逾時
          try {
            const res = await fetch(API_URL, { 
              method:"POST", 
              body: JSON.stringify({action,...body}),
              signal: controller.signal
            });
            clearTimeout(timer);
            const text = await res.text();
            try { return JSON.parse(text); }
            catch(e) { throw new Error("伺服器回應格式錯誤（非 JSON）。GAS 可能正在更新，請稍後再試。"); }
          } catch(e) {
            clearTimeout(timer);
            if(e.name === 'AbortError') throw new Error("連線逾時（超過 25 秒），請確認網路並重試");
            throw e;
          }
        }

        function Loading({ text="載入中..." }) {
          return (
            <div style={{position:"fixed",inset:0,background:"rgba(26,39,68,.7)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999}}>
              <div style={{width:48,height:48,border:"4px solid rgba(255,255,255,.3)",borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite",marginBottom:16}}/>
              <div style={{color:"#FFF",fontFamily:"'新細明體', 'PMingLiU', serif",letterSpacing:2,fontSize:14}}>{text}</div>
              <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
            </div>
          );
        }

        function App(){
          const [page, setPage] = useState("home");
          const [loading, setLoading] = useState(false);
          const [loadingText, setLoadingText] = useState("載入中...");
          const [records, setRecords] = useState([]);
          const [clients, setClients] = useState([]);
          const [f, setF] = useState(emptyForm());
          const [printData, setPrintData] = useState(null);
          const [fYear,setFYear]=useState(""); const [fMonth,setFMonth]=useState(""); const [fClient,setFClient]=useState("");
          const [editClient, setEditClient] = useState(null);
          const [editRecordId, setEditRecordId] = useState(null); // 編輯模式：存放被編輯的記錄 ID
          const [apiReady] = useState(API_URL !== "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec");
          
          const [showDropdown, setShowDropdown] = useState(false);
          const [showHistDropdown, setShowHistDropdown] = useState(false);
          const [loadError, setLoadError] = useState("");

          const upd = p => setF(prev=>({...prev,...p}));
          const updMachine = (id,field,val) => upd({machines:f.machines.map(m=>m.id===id?{...m,[field]:val}:m)});

          const load = useCallback(async (showLoad=true) => {
            if(!apiReady) return;
            if(showLoad){ setLoadingText("載入資料中..."); setLoading(true); }
            try {
              const [cs, rs] = await Promise.all([api("getClients"), api("getRecords",{filters:{}})]);
              
              const parsedClients = (Array.isArray(cs)?cs:[]).map(c => {
                  let msRaw = safeParse(c.machines, []);
                  let ms = Array.isArray(msRaw) ? [...msRaw] : [];
                  let sets = { taxMode: "未稅", overageTaxMode: "未稅", billingCycle: "1", rentCycle: "", bw2colConvert: false, bw2colRatio: "10", bw2colMultiMode: "perMachine", machineType: "color", multiCalcMode: "pooled", memo: "" };
                  
                  const backpacks = ms.filter(x => x && x._isSettings);
                  if (backpacks.length > 0) {
                      sets = { ...sets, ...backpacks[backpacks.length - 1] };
                  }
                  ms = ms.filter(x => !x || !x._isSettings);
                  
                  if (sets.taxMode === "含稅") sets.taxMode = "外加";
                  if (sets.overageTaxMode === "含稅") sets.overageTaxMode = "外加";
                  if (!sets.overageTaxMode) sets.overageTaxMode = sets.taxMode;

                  return { ...c, ...sets, machines: ms };
              });

              const parsedRecords = (Array.isArray(rs)?rs:[]).map(r => {
                  let tMode = r.taxMode; if(tMode === "含稅") tMode = "外加";
                  let oMode = r.overageTaxMode || tMode; if(oMode === "含稅") oMode = "外加";
                  return {
                      ...r,
                      taxMode: tMode,
                      overageTaxMode: oMode,
                      machines: safeParse(r.machines, []),
                      bw: safeParse(r.bw, {}),
                      col: safeParse(r.col, {})
                  };
              });
              
              setClients(parsedClients);
              setRecords(parsedRecords);
              setLoadError("");
            } catch(e){ 
              const msg = e?.message || String(e);
              setLoadError(msg);
              if(showLoad) alert("載入失敗：" + msg + "\n\n可點畫面上的「重新連線」按鈕重試。");
            }
            setLoading(false);
          }, [apiReady]);

          useEffect(()=>{ load(); },[load]);

          async function selectClient(name){
            upd({clientName:name});
            const client=clients.find(c=>c.name===name);
            
            if(!client){ 
                upd({
                    clientId:"", 
                    clientName:name, 
                    billingCycle: "1",
                    bwCur: "", bwPrev: "", colCur: "", colPrev: ""
                }); 
                return; 
            }

            setLoadingText("讀取上期資料..."); setLoading(true);
            try {
              const prevRecs = await api("getRecords",{filters:{clientId:client.id}});
              const prev = Array.isArray(prevRecs)&&prevRecs.length>0 ? prevRecs[0] : null;
              
              let pMachines = prev ? safeParse(prev.machines, []) : [];
              let pbw = prev ? safeParse(prev.bw, {}) : {};
              let pcol = prev ? safeParse(prev.col, {}) : {};
              
              const patch = { 
                clientId:client.id, clientName:client.name, mode:client.mode||"single", model:client.model||"", 
                taxMode: client.taxMode||"未稅", overageTaxMode: client.overageTaxMode||client.taxMode||"未稅", 
                billingCycle: client.billingCycle||"1", rentCycle: client.rentCycle||"", 
                bw2colConvert: !!client.bw2colConvert, bw2colRatio: String(client.bw2colRatio||"10"), bw2colMultiMode: client.bw2colMultiMode||"perMachine", 
                machineType: client.machineType||"color", multiCalcMode: client.multiCalcMode||"pooled",
                bwQuota:String(client.bwQuota||""), bwPrice:String(client.bwPrice||"0.35"), colQuota:String(client.colQuota||""), colPrice:String(client.colPrice||"3.5"), 
                baseRent:String(client.baseRent||""), rentNote:client.memo||client.rentNote||"", bwCur:"", colCur:"", bwDeduct:"", bwDeductNote:"", colDeduct:"", colDeductNote:"",
                mBwPrice:String(client.mBwPrice||"0.35"), mColPrice:String(client.mColPrice||"3.5")
              };
              
              if(client.mode==="multi") {
                 patch.machines = (client.machines && client.machines.length > 0 ? client.machines : [emptyMachine()]).map((cm, i) => {
                    const pm = pMachines[i];
                    return {
                       ...emptyMachine(), ...cm,
                       type: cm.type || "color",
                       bwQuota: cm.bwQuota !== undefined ? cm.bwQuota : "",
                       bwPrice: cm.bwPrice !== undefined ? cm.bwPrice : (client.mBwPrice || "0.35"),
                       colQuota: cm.colQuota !== undefined ? cm.colQuota : "",
                       colPrice: cm.colPrice !== undefined ? cm.colPrice : (client.mColPrice || "3.5"),
                       baseRent: cm.baseRent !== undefined ? cm.baseRent : (i===0 ? (client.baseRent||"") : ""),
                       bwPrev: pm ? String((pm.bw?.newInit!==undefined&&pm.bw?.newInit!=="") ? pm.bw.newInit : (pm.bwCur || pm.bwActual || "")) : "",
                       colPrev: pm ? String((pm.col?.newInit!==undefined&&pm.col?.newInit!=="") ? pm.col.newInit : (pm.colCur || pm.colActual || "")) : ""
                    };
                 });
              } else {
                 if(prev) { patch.bwPrev=String((pbw?.newInit!==undefined&&pbw?.newInit!=="") ? pbw.newInit : (pbw?.current||"")); patch.colPrev=String((pcol?.newInit!==undefined&&pcol?.newInit!=="") ? pcol.newInit : (pcol?.current||"")); }
                 else { patch.bwPrev=""; patch.colPrev=""; }
              }
              upd(patch);
            } catch(e){
                console.error(e);
                upd({ bwPrev: "", colPrev: "", billingCycle: "1" });
            }
            setLoading(false);
          }

          async function upsertClientProfile(form){
            const existing=clients.find(c=>c.id===form.clientId||c.name===form.clientName.trim());
            const baseMs = form.mode==="multi" ? form.machines.map(m=>({ id:m.id, type:m.type||"color", model:m.model, baseRent:m.baseRent, rentNote:m.rentNote, bwQuota:m.bwQuota, bwPrice:m.bwPrice, colQuota:m.colQuota, colPrice:m.colPrice })) : [];
            
            const payloadMs = [...baseMs.filter(m => !m._isSettings), {
                _isSettings: true,
                taxMode: form.taxMode || "未稅",
                overageTaxMode: form.overageTaxMode || "未稅",
                billingCycle: form.billingCycle || "1",
                rentCycle: form.rentCycle || "",
                bw2colConvert: !!form.bw2colConvert,
                bw2colRatio: form.bw2colRatio || "10",
                bw2colMultiMode: form.bw2colMultiMode || "perMachine",
                machineType: form.machineType || "color",
                multiCalcMode: form.multiCalcMode || "pooled",
                memo: form.rentNote || existing?.memo || ""
            }];

            const profile={
               id:existing?.id||String(Date.now()), name:form.clientName.trim(), mode:form.mode,
               model:form.model, bwQuota:form.bwQuota, bwPrice:form.bwPrice, colQuota:form.colQuota, colPrice:form.colPrice, baseRent:form.baseRent, rentNote:form.rentNote,
               mBwPrice:form.mBwPrice, mColPrice:form.mColPrice,
               machines: payloadMs
            };
            await api("saveClient",{client:profile});
            return profile.id;
          }

          function buildRecord(clientId){
            const isSingle = f.mode==="single";
            const cycle = Number(f.billingCycle) || 1;
            const rentCycle = Number(f.rentCycle) || cycle; // 租金週期：空白時跟隨結算週期
            let totalRent = 0, totalOverage = 0;
            
            // 換機模式：總印量 = 舊機印量 + 新機印量
            const bwNewExtra = f.machineSwapped ? Math.max(0,(Number(f.bwNewCur)||0)-(Number(f.bwNewInit)||0)) : 0;
            const colNewExtra = f.machineSwapped ? Math.max(0,(Number(f.colNewCur)||0)-(Number(f.colNewInit)||0)) : 0;
            const bwCalc = calcFee(f.bwCur,f.bwPrev,f.bwQuota,f.bwPrice,f.bwDeduct, cycle);
            const colCalcBase = f.machineType === "bw" ? {raw:0, actual:0, over:0, fee:0} : calcFee(f.colCur,f.colPrev,f.colQuota,f.colPrice,f.colDeduct, cycle);
            // 把新機印量加入，重新計算超印
            const bwRawTotal = bwCalc.raw + bwNewExtra;
            const bwActualTotal = Math.max(0, bwRawTotal - (Number(f.bwDeduct)||0));
            const bwQuotaTotal = (Number(f.bwQuota)||0)*cycle;
            const bwOverTotal = Math.max(0, bwActualTotal - bwQuotaTotal);
            const bw = { ...bwCalc, raw: bwRawTotal, actual: bwActualTotal, over: bwOverTotal, fee: Math.round(bwOverTotal*(Number(f.bwPrice)||0)) };
            const colRawTotal = colCalcBase.raw + colNewExtra;
            const colActualTotal = Math.max(0, colRawTotal - (Number(f.colDeduct)||0));
            const colQuotaTotal = (Number(f.colQuota)||0)*cycle;
            // 黑白剩餘額度換算彩色額度（例：黑白剩 3000 ÷ 10 = 彩色 +300 張）
            const convOn = !!f.bw2colConvert && f.machineType !== "bw";
            const convRatio = Number(f.bw2colRatio) || 10;
            const bwLeftover = Math.max(0, bwQuotaTotal - bwActualTotal);
            const colBonus = convOn ? Math.floor(bwLeftover / convRatio) : 0;
            const colQuotaEff = colQuotaTotal + colBonus;
            const colOverTotal = Math.max(0, colActualTotal - colQuotaEff);
            const col = f.machineType === "bw" ? {raw:0, actual:0, over:0, fee:0, current:"", prev:"", quota:"", price:"", deduct:0} : { ...colCalcBase, raw: colRawTotal, actual: colActualTotal, over: colOverTotal, fee: Math.round(colOverTotal*(Number(f.colPrice)||0)), quota: colQuotaEff, quotaBase: colQuotaTotal, bwConvertBonus: colBonus, bwLeftoverUsed: colBonus*convRatio, convRatio: convOn?convRatio:0 };
            
            let tBwRaw=0, tBwQuota=0, tBwDeduct=0, tBwOver=0, tBwFee=0;
            let tColRaw=0, tColQuota=0, tColDeduct=0, tColOver=0, tColFee=0;
            let tBwLeftover=0, tColBonus=0, multiColBonusForQuota=0; // 多台換算彩色用
            const convMethod = f.bw2colMultiMode || "perMachine"; // perMachine 各台各自換 / pooled 全部併起來換

            const ms = f.machines.map(m => {
               const mBwOldRaw = Math.max(0,(Number(m.bwCur)||0)-(Number(m.bwPrev)||0));
               const mBwNewRaw = m.machineSwapped ? Math.max(0,(Number(m.bwNewCur)||0)-(Number(m.bwNewInit)||0)) : 0;
               const mBwRaw = mBwOldRaw + mBwNewRaw;
               const mColOldRaw = m.type === "bw" ? 0 : Math.max(0,(Number(m.colCur)||0)-(Number(m.colPrev)||0));
               const mColNewRaw = (m.machineSwapped && m.type !== "bw") ? Math.max(0,(Number(m.colNewCur)||0)-(Number(m.colNewInit)||0)) : 0;
               const mColRaw = mColOldRaw + mColNewRaw;
               
               const mBwActual = Math.max(0, mBwRaw - (Number(m.bwDeduct)||0));
               const mColActual = Math.max(0, mColRaw - (Number(m.colDeduct)||0));
               
               const mBwQuotaT = (Number(m.bwQuota)||0)*cycle;
               const mColQuotaBase = (Number(m.colQuota)||0)*cycle;
               const mBwOverCalc = Math.max(0, mBwActual - mBwQuotaT);
               const mBwLeftover = Math.max(0, mBwQuotaT - mBwActual);
               // 各台各自換：本台黑白剩餘 → 本台彩色額度
               const mColBonus = (f.bw2colConvert && convMethod==="perMachine" && m.type!=="bw") ? Math.floor(mBwLeftover / convRatio) : 0;
               const mColQuotaEff = mColQuotaBase + mColBonus;
               const mColOverCalc = Math.max(0, mColActual - mColQuotaEff);
               tBwLeftover += mBwLeftover; tColBonus += mColBonus;
               
               const currentBwPrice = f.multiCalcMode === "separate" ? (Number(m.bwPrice)||0) : (Number(f.mBwPrice)||0);
               const currentColPrice = f.multiCalcMode === "separate" ? (Number(m.colPrice)||0) : (Number(f.mColPrice)||0);

               const mBwFeeCalc = Math.round(mBwOverCalc * currentBwPrice);
               const mColFeeCalc = Math.round(mColOverCalc * currentColPrice);

               tBwRaw += mBwRaw; tBwQuota += (Number(m.bwQuota)||0)*cycle; tBwDeduct += Number(m.bwDeduct)||0;
               tColRaw += mColRaw; tColQuota += (Number(m.colQuota)||0)*cycle; tColDeduct += Number(m.colDeduct)||0;
               
               return {
                  ...m,
                  bw: { current:m.bwCur, prev:m.bwPrev, raw:mBwRaw, actual:mBwActual, quota:(Number(m.bwQuota)||0)*cycle, deduct:m.bwDeduct, note:m.bwDeductNote, over:mBwOverCalc, price:currentBwPrice, fee:mBwFeeCalc,
                    ...(m.machineSwapped ? {
                      machineSwapped:true,
                      oldRaw: mBwOldRaw,
                      newMachineInit: m.bwNewInit, newMachineCur: m.bwNewCur,
                      newRaw: mBwNewRaw,
                      newInit: m.bwNewCur
                    } : {})
                  },
                  col: { current:m.colCur, prev:m.colPrev, raw:mColRaw, actual:mColActual, quota:mColQuotaEff, quotaBase:mColQuotaBase, bwConvertBonus:mColBonus, bwLeftoverUsed:mColBonus*convRatio, convRatio:(mColBonus>0?convRatio:0), deduct:m.colDeduct, note:m.colDeductNote, over:mColOverCalc, price:currentColPrice, fee:mColFeeCalc,
                    ...(m.machineSwapped ? {
                      machineSwapped:true,
                      oldRaw: mColOldRaw,
                      newMachineInit: m.colNewInit, newMachineCur: m.colNewCur,
                      newRaw: mColNewRaw,
                      newInit: m.colNewCur
                    } : {})
                  },
                  bwActual: mBwActual, colActual: mColActual 
               };
            });

            if (isSingle) {
               totalRent = (Number(f.baseRent) || 0) * rentCycle;
               totalOverage = bw.fee + col.fee;
            } else {
               // 多台：黑白剩餘換算彩色的加成總量
               const convPoolBonus = f.bw2colConvert ? (convMethod==="pooled" ? Math.floor(tBwLeftover/convRatio) : tColBonus) : 0;

               // 各台獨立計費 + 全部併起來換：把合併加成依機台順序折抵各台彩色超印
               if (f.multiCalcMode === "separate" && f.bw2colConvert && convMethod === "pooled") {
                  let remain = convPoolBonus;
                  ms.forEach(m => {
                     if (remain <= 0 || m.type === "bw") return;
                     const use = Math.min(remain, m.col.over);
                     if (use > 0) {
                        m.col.over -= use;
                        m.col.quota = (Number(m.col.quota)||0) + use;
                        m.col.bwConvertBonus = (Number(m.col.bwConvertBonus)||0) + use;
                        m.col.bwLeftoverUsed = (Number(m.col.bwLeftoverUsed)||0) + use*convRatio;
                        m.col.convRatio = convRatio;
                        m.col.fee = Math.round(m.col.over * (Number(m.col.price)||0));
                        remain -= use;
                     }
                  });
               }

               ms.forEach(m => { 
                  totalRent += (Number(m.baseRent)||0) * rentCycle; 
                  if (f.multiCalcMode === "separate") {
                     tBwOver += m.bw.over; tColOver += m.col.over;
                     tBwFee += m.bw.fee; tColFee += m.col.fee;
                  }
               });

               if (f.multiCalcMode === "pooled") {
                  const poolBwActual = Math.max(0, tBwRaw - tBwDeduct);
                  tBwOver = Math.max(0, poolBwActual - tBwQuota);
                  tBwFee = Math.round(tBwOver * (Number(f.mBwPrice)||0));

                  const poolColActual = Math.max(0, tColRaw - tColDeduct);
                  multiColBonusForQuota = convPoolBonus; // 併入合併彩色總額度
                  tColOver = Math.max(0, poolColActual - (tColQuota + multiColBonusForQuota));
                  tColFee = Math.round(tColOver * (Number(f.mColPrice)||0));
               }
               
               totalOverage = tBwFee + tColFee;
            }

            const rentTaxAmount = f.taxMode === "外加" ? Math.round(totalRent * 0.05) : 0;
            const overageTaxAmount = f.overageTaxMode === "外加" ? Math.round(totalOverage * 0.05) : 0;
            const taxAmount = rentTaxAmount + overageTaxAmount;
            
            const subtotal = totalRent + totalOverage;
            const finalTotal = subtotal + taxAmount;

            return {
               id:Date.now(), clientId, mode:f.mode, clientName:f.clientName, billingYear:f.billingYear, billingMonth:f.billingMonth, billingCycle:cycle, rentCycle:rentCycle, bw2colConvert:convOn, bw2colRatio:convRatio, periodStart:f.periodStart, periodEnd:f.periodEnd,
               taxMode:f.taxMode, overageTaxMode:f.overageTaxMode, machineType:f.machineType, multiCalcMode:f.multiCalcMode,
               baseRent:totalRent, rentNote:f.rentNote||"", model:f.model,
               bw:{current:f.bwCur,prev:f.bwPrev,quota:(Number(f.bwQuota)||0)*cycle,price:f.bwPrice,deduct:f.bwDeduct,note:f.bwDeductNote,...bw,
                 ...(f.machineSwapped ? {
                   machineSwapped:true,
                   oldRaw: Math.max(0,(Number(f.bwCur)||0)-(Number(f.bwPrev)||0)),
                   newMachineInit: f.bwNewInit, newMachineCur: f.bwNewCur,
                   newRaw: Math.max(0,(Number(f.bwNewCur)||0)-(Number(f.bwNewInit)||0)),
                   newInit: f.bwNewCur
                 } : {})
               },
               col:{current:f.colCur,prev:f.colPrev,quota:(Number(f.colQuota)||0)*cycle,price:f.colPrice,deduct:f.colDeduct,note:f.colDeductNote,...col,
                 ...(f.machineSwapped ? {
                   machineSwapped:true,
                   oldRaw: Math.max(0,(Number(f.colCur)||0)-(Number(f.colPrev)||0)),
                   newMachineInit: f.colNewInit, newMachineCur: f.colNewCur,
                   newRaw: Math.max(0,(Number(f.colNewCur)||0)-(Number(f.colNewInit)||0)),
                   newInit: f.colNewCur
                 } : {})
               },
               machines:ms, 
               totalBwRaw: isSingle ? bw.raw : tBwRaw, 
               totalColRaw: isSingle ? col.raw : tColRaw,
               bwQuota: isSingle ? (Number(f.bwQuota)||0)*cycle : tBwQuota,
               colQuota: isSingle ? (Number(f.colQuota)||0)*cycle : (tColQuota + multiColBonusForQuota),
               multiColConvBonus: (!isSingle && f.bw2colConvert) ? (convMethod==="pooled" ? Math.floor(tBwLeftover/convRatio) : tColBonus) : 0,
               multiBwLeftover: isSingle ? 0 : tBwLeftover,
               bw2colMultiMode: convMethod,
               bwDeduct: isSingle ? f.bwDeduct : tBwDeduct,
               colDeduct: isSingle ? f.colDeduct : tColDeduct,
               bwActual: isSingle ? bw.actual : Math.max(0, tBwRaw - tBwDeduct),
               colActual: isSingle ? col.actual : Math.max(0, tColRaw - tColDeduct),
               bwOver: isSingle ? bw.over : tBwOver,
               colOver: isSingle ? col.over : tColOver,
               bwPrice: isSingle ? f.bwPrice : f.mBwPrice,
               colPrice: isSingle ? f.colPrice : f.mColPrice,
               bwFee: isSingle ? bw.fee : tBwFee,
               colFee: isSingle ? col.fee : tColFee,
               subtotal: subtotal, taxAmount: taxAmount,
               total: finalTotal, createdAt:new Date().toISOString()
            };
          }

          // 將已存記錄轉回表單格式（供編輯用）

                                    <div><label style={{...lbl,color:C.navy,fontWeight:"bold"}}>本期🔵</label><input style={inp({border:"2px solid "+C.navy})} value={m.colCur||""} onChange={e=>updMachine(m.id,"colCur",e.target.value)}/></div>
                                    <div><label style={lbl}>上期</label><input style={inp({background:"#F5F5F5"})} value={m.colPrev||""} onChange={e=>updMachine(m.id,"colPrev",e.target.value)}/></div>
                                    <div><label style={lbl}>本機單月額度</label><input style={inp()} value={m.colQuota||""} onChange={e=>updMachine(m.id,"colQuota",e.target.value)}/></div>
                                    {f.multiCalcMode === "separate" && <div><label style={{...lbl,color:C.danger,fontWeight:"bold"}}>本機單價</label><input style={inp({border:"1px solid "+C.danger})} value={m.colPrice||""} onChange={e=>updMachine(m.id,"colPrice",e.target.value)}/></div>}
                                    <div><label style={lbl}>扣除張數</label><input style={inp()} value={m.colDeduct||""} onChange={e=>updMachine(m.id,"colDeduct",e.target.value)}/></div>
                                    <div style={{gridColumn: f.multiCalcMode==="separate"?"span 5":"span 4"}}><label style={lbl}>扣除備註</label><input style={inp()} value={m.colDeductNote||""} onChange={e=>updMachine(m.id,"colDeductNote",e.target.value)} placeholder="可填寫扣除原因"/></div>
                                  </div>
                                  )}
                                </div>
                              )}
                            </div>
                        ))}
                        <button onClick={()=>upd({machines:[...f.machines, emptyMachine()]})} style={{...btnS("light"),width:"100%",marginBottom:16}}>＋ 新增機台</button>
                      </div>
                    )}
                    
                    {(()=>{
                      let sumRent = 0, sumBwRaw = 0, sumBwQuota = 0, sumBwDeduct = 0, sumBwOver = 0, sumBwFee = 0;
                      let sumColRaw = 0, sumColQuota = 0, sumColDeduct = 0, sumColOver = 0, sumColFee = 0;
                      const cycle = Number(f.billingCycle) || 1;
                      const rentCycle = Number(f.rentCycle) || cycle;
                      const convOn = !!f.bw2colConvert && (f.mode!=="single" || f.machineType!=="bw");
                      const convRatio = Number(f.bw2colRatio) || 10;
                      let convBonus = 0, convLeftover = 0;

                      if (f.mode === "single") {
                        const sBw = calcFee(f.bwCur, f.bwPrev, f.bwQuota, f.bwPrice, f.bwDeduct, cycle);
                        const sCol = f.machineType === "bw" ? {raw:0,actual:0,over:0,fee:0} : calcFee(f.colCur, f.colPrev, f.colQuota, f.colPrice, f.colDeduct, cycle);
                        sumRent = (Number(f.baseRent)||0) * rentCycle;
                        sumBwRaw = sBw.raw; sumBwQuota = (Number(f.bwQuota)||0)*cycle; sumBwDeduct = Number(f.bwDeduct)||0; sumBwOver = sBw.over; sumBwFee = sBw.fee;
                        sumColRaw = sCol.raw; sumColDeduct = Number(f.colDeduct)||0;
                        const colQuotaBase = (Number(f.colQuota)||0)*cycle;
                        convLeftover = (convOn && f.machineType!=="bw") ? Math.max(0, sumBwQuota - sBw.actual) : 0;
                        convBonus = Math.floor(convLeftover / convRatio);
                        sumColQuota = colQuotaBase + convBonus;
                        sumColOver = f.machineType==="bw" ? 0 : Math.max(0, sCol.actual - sumColQuota);
                        sumColFee = Math.round(sumColOver * (Number(f.colPrice)||0));
                      } else {
                        const convMethod = f.bw2colMultiMode || "perMachine";
                        let tBwLeftover = 0, tColBonus = 0;
                        const mArr = f.machines.map(m => {
                          const mBwRaw = Math.max(0,(Number(m.bwCur)||0)-(Number(m.bwPrev)||0));
                          const mColRaw = m.type === "bw" ? 0 : Math.max(0,(Number(m.colCur)||0)-(Number(m.colPrev)||0));
                          const mBwActual = Math.max(0, mBwRaw - (Number(m.bwDeduct)||0));
                          const mColActual = Math.max(0, mColRaw - (Number(m.colDeduct)||0));
                          const mBwQuotaT = (Number(m.bwQuota)||0)*cycle;
                          const mColQuotaBase = (Number(m.colQuota)||0)*cycle;
                          const mBwLeftover = Math.max(0, mBwQuotaT - mBwActual);
                          const mColBonus = (convOn && convMethod==="perMachine" && m.type!=="bw") ? Math.floor(mBwLeftover/convRatio) : 0;
                          tBwLeftover += mBwLeftover; tColBonus += mColBonus;
                          sumRent += (Number(m.baseRent)||0) * rentCycle;
                          sumBwRaw += mBwRaw; sumBwQuota += mBwQuotaT; sumBwDeduct += Number(m.bwDeduct)||0;
                          sumColRaw += mColRaw; sumColQuota += mColQuotaBase; sumColDeduct += Number(m.colDeduct)||0;
                          return { m, mBwOver: Math.max(0, mBwActual - mBwQuotaT), mColOver: Math.max(0, mColActual - (mColQuotaBase + mColBonus)) };
                        });
                        const convPoolBonus = convOn ? (convMethod==="pooled" ? Math.floor(tBwLeftover/convRatio) : tColBonus) : 0;
                        convLeftover = tBwLeftover; convBonus = convPoolBonus;

                        if (f.multiCalcMode === "separate") {
                          let remain = (convMethod==="pooled") ? convPoolBonus : 0;
                          mArr.forEach(x => {
                            let colOver = x.mColOver;
                            if (remain>0 && x.m.type!=="bw") { const use=Math.min(remain,colOver); colOver-=use; remain-=use; }
                            sumBwOver += x.mBwOver; sumColOver += colOver;
                            sumBwFee += Math.round(x.mBwOver * (Number(x.m.bwPrice)||0));
                            sumColFee += Math.round(colOver * (Number(x.m.colPrice)||0));
                          });
                        }

                        if (f.multiCalcMode === "pooled") {
                          const bAct = Math.max(0, sumBwRaw - sumBwDeduct);
                          sumBwOver = Math.max(0, bAct - sumBwQuota);
                          sumBwFee = Math.round(sumBwOver * (Number(f.mBwPrice)||0));

                          const poolColActual = Math.max(0, sumColRaw - sumColDeduct);
                          sumColOver = Math.max(0, poolColActual - (sumColQuota + convPoolBonus));
                          sumColFee = Math.round(sumColOver * (Number(f.mColPrice)||0));
                        }
                      }
                      
                      const totalOverageFee = sumBwFee + sumColFee;
                      const subtotal = sumRent + totalOverageFee;
                      
                      const rentTaxAmount = f.taxMode === "外加" ? Math.round(sumRent * 0.05) : 0;
                      const overageTaxAmount = f.overageTaxMode === "外加" ? Math.round(totalOverageFee * 0.05) : 0;
                      const tax = rentTaxAmount + overageTaxAmount;

                      const liveTotal = subtotal + tax;

                      return (
                        <>
                          <div style={{background:"#FFF", border:"1px solid "+C.blueBorder, borderRadius:6, padding:16, marginBottom:16}}>
                            <div style={{fontSize:12, fontWeight:"bold", color:C.navy, marginBottom:12, borderBottom:"1px solid "+C.light, paddingBottom:8}}>🧾 本期費用試算明細 ({cycle}個月結算)</div>
                            
                            {sumRent > 0 && (
                              <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:C.text, marginBottom:8, fontWeight:"bold"}}>
                                <span>基本月租金{f.mode==="multi"?" (各機台總和)":""} (${(sumRent/rentCycle).toLocaleString()} x {rentCycle}個月)</span>
                                <span>${Math.round(sumRent).toLocaleString()}</span>
                              </div>
                            )}

                            {convBonus > 0 && (
                              <div style={{display:"flex", justifyContent:"space-between", fontSize:12, color:C.success, marginBottom:8, fontWeight:"bold", background:"#F0FFF4", border:"1px dashed "+C.success, borderRadius:4, padding:"6px 10px"}}>
                                <span>🔄 黑白剩餘 {convLeftover.toLocaleString()} 張 ÷ {convRatio} = 彩色 +{convBonus.toLocaleString()} 張額度</span>
                                <span>已折抵彩色</span>
                              </div>
                            )}

                            <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:C.text, marginBottom:8, fontWeight:"bold"}}>
                              <span>黑白超印 <span style={{fontSize:11, color:C.muted, marginLeft:4, fontWeight:"normal"}}>(總印 {sumBwRaw.toLocaleString()} - 扣/額 = 超出 {sumBwOver.toLocaleString()} 張)</span></span>
                              <span>${Math.round(sumBwFee).toLocaleString()}</span>
                            </div>

                            {(f.mode==="single"?f.machineType!=="bw":true) && (
                              <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:C.text, marginBottom:8, fontWeight:"bold"}}>
                                <span>彩色超印 <span style={{fontSize:11, color:C.muted, marginLeft:4, fontWeight:"normal"}}>(總印 {sumColRaw.toLocaleString()} - 扣/額 = 超出 {sumColOver.toLocaleString()} 張)</span></span>
                                <span>${Math.round(sumColFee).toLocaleString()}</span>
                              </div>
                            )}

                            {(f.taxMode === "外加" || f.overageTaxMode === "外加") && (
                               <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:C.navy, marginBottom:8, fontWeight:"bold", marginTop: 8, paddingTop: 8, borderTop:"1px dashed #CCC"}}>
                                 <span>外加營業稅 (5%) <span style={{fontSize:11, color:C.muted, marginLeft:4, fontWeight:"normal"}}>[租金:{f.taxMode==="外加"?"外加":f.taxMode} / 超印:{f.overageTaxMode==="外加"?"外加":f.overageTaxMode}]</span></span>
                                 <span>+ ${Math.round(tax).toLocaleString()}</span>
                               </div>
                            )}
                          </div>

                          <div style={{background:C.navy,borderRadius:6,padding:16,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div>
                              <div style={{color:"rgba(255,255,255,.9)",fontSize:14,fontWeight:"bold",marginBottom:4}}>本期預估應收合計</div>
                            </div>
                            <div style={{fontSize:28,fontWeight:"bold",color:C.accent}}>${Math.round(liveTotal).toLocaleString()}</div>
                          </div>
                        </>
                      )
                    })()}
                    
                    <div style={{display:"flex",gap:12}}>
                      <button style={{...btnS("accent"),flex:1}} onClick={()=>handleSave(true)}>{editRecordId ? "✏️ 更新並預覽帳單" : "💾 儲存並預覽帳單"}</button>
                      <button style={{...btnS("light"),flex:1}} onClick={()=>handleSave(false)}>{editRecordId ? "✏️ 更新（不印）" : "儲存（不印）"}</button>
                    </div>
                  </>)}
                </div>
              </div>
            );
          }

          if(page==="clients"){
            const ec=editClient;
            const updEc=p=>setEditClient(prev=>({...prev,...p}));
            const updMachineEc = (idx, field, val) => {

            async function saveEditClient(){

              const payloadMs = [...(ec.machines||[]).filter(m => !m._isSettings), {

                  taxMode: ec.taxMode || "未稅",

                  billingCycle: ec.billingCycle || "1",

              }];

              catch(e){ alert("儲存失敗"); }
              setLoading(false);

                {loading&&<Loading text={loadingText}/>}

                           <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16,background:C.bg,padding:14,borderRadius:4}}>
                             <div><label style={{...lbl,fontWeight:"bold",color:C.navy}}>統一黑白單價</label><input style={inp({border:"2px solid "+C.navy})} value={ec.mBwPrice||""} onChange={e=>updEc({mBwPrice:e.target.value})}/></div>
                             <div><label style={{...lbl,fontWeight:"bold",color:C.navy}}>統一彩色單價</label><input style={inp({border:"2px solid "+C.navy})} value={ec.mColPrice||""} onChange={e=>updEc({mColPrice:e.target.value})}/></div>
                           </div>
                        )}

                        <div style={{fontSize:11,color:C.navy,letterSpacing:2,marginBottom:10,fontWeight:"bold"}}>獨立機台設定</div>
                        {(ec.machines||[]).map((m, i)=>(
                          <div key={m.id} style={{background:C.bg, padding:14, borderRadius:6, marginBottom:12, border:"1px solid "+C.light}}>
                            <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
                              <span style={{fontWeight:"bold", color:C.navy}}>機台 {i+1}</span>
                              {(ec.machines||[]).length>1 && <button onClick={()=>updEc({machines:(ec.machines||[]).filter((_,j)=>j!==i)})} style={{border:"none",background:"none",color:C.danger,cursor:"pointer",fontWeight:"bold"}}>✕</button>}
                            </div>
                            <div style={{marginBottom:8}}>
                               <TogglePill options={[{label:"黑白機",val:"bw"},{label:"彩色機",val:"color"}]} value={m.type||"color"} onChange={v=>updMachineEc(i,"type",v)} />
                            </div>
                            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10}}>
                              <div><label style={lbl}>機型 / 地點</label><input style={inp()} value={m.model||""} onChange={e=>updMachineEc(i,"model",e.target.value)} placeholder="例：MPC3503"/></div>
                              <div><label style={lbl}>單月基本租金</label><input style={inp()} value={m.baseRent||""} onChange={e=>updMachineEc(i,"baseRent",e.target.value)} placeholder="0"/></div>
                            </div>
                            <div style={{display:"grid", gridTemplateColumns: m.type==="bw"?"1fr":"1fr 1fr", gap:10, marginBottom:10}}>
                              <div><label style={lbl}>本機單月黑白額度</label><input style={inp()} value={m.bwQuota||""} onChange={e=>updMachineEc(i,"bwQuota",e.target.value)} placeholder="0"/></div>
                              {m.type !== "bw" && <div><label style={lbl}>本機單月彩色額度</label><input style={inp()} value={m.colQuota||""} onChange={e=>updMachineEc(i,"colQuota",e.target.value)} placeholder="0"/></div>}
                            </div>
                            {ec.multiCalcMode === "separate" && (
                               <div style={{display:"grid", gridTemplateColumns: m.type==="bw"?"1fr":"1fr 1fr", gap:10, paddingTop:8, borderTop:"1px dashed #DDD"}}>
                                 <div><label style={{...lbl,color:C.danger}}>本機黑白單價</label><input style={inp({border:"1px solid "+C.danger})} value={m.bwPrice||""} onChange={e=>updMachineEc(i,"bwPrice",e.target.value)}/></div>
                                 {m.type !== "bw" && <div><label style={{...lbl,color:C.danger}}>本機彩色單價</label><input style={inp({border:"1px solid "+C.danger})} value={m.colPrice||""} onChange={e=>updMachineEc(i,"colPrice",e.target.value)}/></div>}
                               </div>
                            )}
                          </div>
                        ))}
                        <button onClick={()=>updEc({machines:[...(ec.machines||[]), emptyMachine()]})} style={{...btnS("light"),fontSize:12,padding:"6px 14px",width:"100%"}}>＋ 新增機台</button>
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <button style={{...btnS("primary"),flex:1}} onClick={saveEditClient}>✓ 儲存</button>
                    <button style={{...btnS("light"),flex:1}} onClick={()=>setEditClient(null)}>取消</button>
                  </div>
                </div>
              </div>
            );
            
            return (
              <div style={{fontFamily:"'新細明體', 'PMingLiU', serif",minHeight:"100vh",background:C.bg,paddingBottom:40}}>
                {loading&&<Loading text={loadingText}/>}
                <div style={{background:C.navy,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:16}}>
                    <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:"#FFF",cursor:"pointer",fontSize:18}}>←</button>
                    <div><div style={{fontSize:11,letterSpacing:4,color:C.accent}}>CLIENTS</div><div style={{color:"#FFF",fontSize:18,fontWeight:"bold"}}>客戶資料管理</div></div>
                  </div>
                  <button style={btnS("accent",{fontSize:13,padding:"8px 16px"})} onClick={()=>setEditClient({_isNew:true,mode:"single",taxMode:"未稅",overageTaxMode:"未稅",billingCycle:"1",machineType:"color",multiCalcMode:"pooled",machines:[emptyMachine()]})}>＋ 新增</button>
                </div>
                <div style={{padding:"16px",maxWidth:720,margin:"0 auto"}}>
                  {clients.length===0&&<div style={{textAlign:"center",color:C.muted,padding:60,fontWeight:"bold"}}>尚無客戶資料</div>}
                  {clients.map(c=>(
                    <div key={c.id} style={{background:"#FFF",borderRadius:6,padding:16,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:"bold",fontSize:16}}>{c.name} <span style={{fontSize:11, color:C.danger, fontWeight:"bold", marginLeft:6}}>[{c.billingCycle||1}個月結]</span>{c.rentCycle && String(c.rentCycle)!==String(c.billingCycle||"1") && <span style={{fontSize:11, color:C.blue, fontWeight:"bold", marginLeft:4}}>[租金{c.rentCycle}個月]</span>}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:3}}>{c.mode==="single"?"單台":"多台"} ｜ 租金:{c.taxMode||"未稅"} / 超印:{c.overageTaxMode||c.taxMode||"未稅"} ｜ {c.machineType==="bw"?"黑白機":"彩色機"}</div>
                        {(c.memo||c.rentNote) && <div style={{fontSize:11,color:C.orange,marginTop:3,fontWeight:"bold"}}>📝 {c.memo||c.rentNote}</div>}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setEditClient({...c})} style={{...btnS("light"),padding:"6px 14px",fontSize:12}}>編輯</button>
                        <button onClick={()=>deleteClient(c.id)} style={{...btnS("red"),padding:"6px 14px",fontSize:12}}>刪除</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          }

          if(page==="history") return (
            <div style={{fontFamily:"'新細明體', 'PMingLiU', serif",minHeight:"100vh",background:C.bg,paddingBottom:40}}>
              {loading&&<Loading text={loadingText}/>}
              <div style={{background:C.navy,padding:"16px 20px",display:"flex",alignItems:"center",gap:16}}>
                <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:"#FFF",cursor:"pointer",fontSize:18}}>←</button>
                <div><div style={{fontSize:11,letterSpacing:4,color:C.accent}}>HISTORY</div><div style={{color:"#FFF",fontSize:18,fontWeight:"bold"}}>歷史查詢</div></div>
                <button onClick={()=>load()} style={{marginLeft:"auto",background:"none",border:"1px solid rgba(255,255,255,.5)",color:"#FFF",borderRadius:4,padding:"4px 12px",cursor:"pointer",fontSize:12,fontFamily:"'新細明體', 'PMingLiU', serif"}}>🔄 重新整理</button>
              </div>
              {loadError && <div style={{background:"#FFF0F0",borderBottom:"2px solid "+C.danger,padding:"8px 16px",fontSize:12,color:C.danger,fontWeight:"bold"}}>⚠️ 載入失敗：{loadError} <button onClick={()=>load()} style={{marginLeft:12,padding:"2px 10px",background:C.danger,color:"#FFF",border:"none",borderRadius:3,cursor:"pointer",fontSize:11,fontFamily:"'新細明體', 'PMingLiU', serif"}}>重試</button></div>}
              <div style={{padding:"16px",maxWidth:720,margin:"0 auto"}}>
                
                <div style={{background:"#FFF",borderRadius:6,padding:16,marginBottom:16,display:"flex",gap:10,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:80}}><label style={lbl}>年度</label><input style={inp()} value={fYear} onChange={e=>setFYear(e.target.value)} placeholder="全部"/></div>
                  <div style={{flex:1,minWidth:80}}><label style={lbl}>月份</label><select style={inp()} value={fMonth} onChange={e=>setFMonth(e.target.value)}><option value="">全部</option>{MONTHS.map((m,i)=><option key={i} value={String(i+1)}>{m}</option>)}</select></div>
                  <div style={{flex:2,minWidth:140, position: "relative"}}>
                    <label style={lbl}>客戶名稱</label>
                    <input 
                      style={inp()} 
                      value={fClient} 
                      onChange={e => { setFClient(e.target.value); setShowHistDropdown(true); }}
                      onFocus={() => setShowHistDropdown(true)}
                      onBlur={() => setTimeout(()=>setShowHistDropdown(false), 200)}
                      placeholder="輸入關鍵字篩選..."
                    />
                    {showHistDropdown && (
                      <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#FFF", border: "1px solid "+C.light, borderTop: "none", borderRadius: "0 0 6px 6px", boxShadow: "0 8px 24px rgba(0,0,0,0.15)", zIndex: 100, maxHeight: "250px", overflowY: "auto" }}>
                        <div onClick={() => { setFClient(""); setShowHistDropdown(false); }} onMouseDown={(e) => e.preventDefault()} style={{ padding: "10px 14px", borderBottom: "1px solid #F5F5F5", cursor: "pointer", fontSize: 13, color: C.muted }}>[ 顯示全部客戶 ]</div>
                        {clients.filter(c => c.name.toLowerCase().includes(fClient.toLowerCase())).map(c => (
                          <div
                            key={c.id}
                            onClick={() => { setFClient(c.name); setShowHistDropdown(false); }}
                            onMouseDown={(e) => e.preventDefault()} 
                            style={{ padding: "10px 14px", borderBottom: "1px solid #F5F5F5", cursor: "pointer", fontSize: 14, color: C.navy, fontWeight:"bold" }}
                          >
                            {c.name}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                <div style={{fontSize:12,color:C.muted,marginBottom:10,fontWeight:"bold"}}>共 {filtered.length} 筆</div>
                
                {filtered.map(r=>(
                  <div key={r.id} style={{background:"#FFF",borderRadius:6,padding:16,marginBottom:10,cursor:"pointer",borderLeft:"4px solid "+(r.total>0?C.danger:C.success)}} onClick={()=>{setPrintData(r);setPage("preview")}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:"bold",fontSize:16}}>{r.clientName}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:4}}>民國 {r.billingYear} 年 {r.billingMonth} 月 ｜ {r.billingCycle||1}個月結 ｜ 租:{r.taxMode||"未稅"} / 超:{r.overageTaxMode||r.taxMode||"未稅"}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:20,fontWeight:"bold",color:r.total>0?C.danger:C.success}}>${Math.round(Number(r.total)).toLocaleString()}</div>
                        <div style={{display:"flex", gap:8, justifyContent:"flex-end", marginTop: 6}}>
                          <button onClick={(e)=>{e.stopPropagation(); setPrintData(r); setPage("preview");}} style={{...btnS("light"), padding:"4px 10px", fontSize:11}}>預覽帳單</button>
                          <button onClick={(e)=>{e.stopPropagation(); setEditRecordId(r.id); setF(editRecordToForm(r)); setPage("input");}} style={{...btnS("accent"), padding:"4px 10px", fontSize:11}}>✏️ 編輯</button>
                          <button onClick={(e)=>{e.stopPropagation(); deleteHistoryRecord(r.id);}} style={{...btnS("red"), padding:"4px 10px", fontSize:11}}>刪除</button>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          if(page==="preview"&&printData){
            const r=printData,isSingle=r.mode==="single", cycle = r.billingCycle || 1, rentCycle = r.rentCycle || cycle;
            
            let gRent = Number(r.baseRent)||0;
            let gOverage = (r.bwFee||0) + (r.colFee||0);

            const rentTaxAmount = r.taxMode === "外加" ? Math.round(gRent * 0.05) : 0;
            const overageTaxAmount = r.overageTaxMode === "外加" ? Math.round(gOverage * 0.05) : 0;

            const showMachineFee = isSingle || r.multiCalcMode === "separate";

            const renderMachineTable = (m, idx, isOnlyMachine) => {
               const d_bw = m.bw || {current: m.bwCur, prev: m.bwPrev, raw: m.bwActual||0, deduct:0, actual:m.bwActual||0, quota:0, price:0, fee:0};
               const d_col = m.col || {current: m.colCur, prev: m.colPrev, raw: m.colActual||0, deduct:0, actual:m.colActual||0, quota:0, price:0, fee:0};
               const hasD = (Number(d_bw.deduct)||0)>0 || (Number(d_col.deduct)||0)>0;
               const mType = m.type || (isOnlyMachine ? r.machineType : "color"); 

               const headers = showMachineFee 
                  ? ["項目","本期錶號","上期錶號","總印量","扣除張數","計費印量","本期總額度","超出張數","單價","費用"]
                  : ["項目","本期錶號","上期錶號","總印量","扣除張數","計費印量","本期總額度"];

               const rows = [ {lb:"黑白列印", d:d_bw} ];
               if (mType !== "bw") rows.push({lb:"彩色列印", d:d_col});

               return (
                  <div key={idx} style={{marginBottom: 24}}>
                      {!isOnlyMachine && <div style={{fontSize:13,letterSpacing:2,color:C.navy,marginBottom:8,fontWeight:"bold",borderBottom:"2px solid "+C.navy,paddingBottom:4}}>機台 {idx+1}：{m.model||"—"}</div>}
                      {isOnlyMachine && <div style={{fontSize:10,letterSpacing:3,color:C.navy,marginBottom:8,fontWeight:"bold"}}>超印費用　機型：{r.model||"—"}</div>}
                      
                      {Number(m.baseRent) > 0 && (
                        <div style={{marginBottom:10, display:"flex", justifyContent:"space-between", borderTop:"2px solid #000", borderBottom:"2px solid #000", padding:"8px 12px"}}>
                           <span style={{fontWeight:"bold", color:"#000"}}>本期基本租金 (已乘月數) {m.rentNote?"("+m.rentNote+")":""}</span>
                           <span style={{fontWeight:"bold", color:"#000"}}>${Math.round(Number(m.baseRent)).toLocaleString()}</span>
                        </div>
                      )}

                      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:hasD?10:14}}>
                        <thead><tr style={{borderTop:"2px solid #000", borderBottom:"2px solid #000"}}>
                            {headers.map(h=><th key={h} style={{padding:"10px 7px",color:"#000",fontSize:12,textAlign:h==="項目"?"left":"right",fontWeight:"bold"}}>{h}</th>)}
                        </tr></thead>
                        <tbody>
                            {rows.map(({lb,d}, i)=>{
                              if(d.machineSwapped) {
                                // 換機：拆成舊機＋新機兩行，再一行合計
                                const colSpanAll = showMachineFee ? 10 : 7;
                                return (
                                  <React.Fragment key={lb}>
                                    <tr><td colSpan={colSpanAll} style={{padding:"4px 7px",fontSize:10,fontWeight:"bold",color:"#888",background:"#FAFAFA",borderBottom:"1px solid #EEE"}}>　{lb}（換機結算期）</td></tr>
                                    <tr>
                                      <td style={{padding:"8px 7px 4px 16px",color:"#555",fontSize:11,fontWeight:"bold",borderBottom:"none"}}>↳ 舊機</td>
                                      <td style={{padding:"8px 7px 4px",textAlign:"right",fontSize:11,color:"#555",borderBottom:"none"}}>{Number(d.current||0).toLocaleString()}</td>
                                      <td style={{padding:"8px 7px 4px",textAlign:"right",fontSize:11,color:"#555",borderBottom:"none"}}>{Number(d.prev||0).toLocaleString()}</td>
                                      <td style={{padding:"8px 7px 4px",textAlign:"right",fontSize:11,color:"#555",borderBottom:"none"}}>{Number(d.oldRaw||0).toLocaleString()}</td>
                                      <td style={{padding:"8px 7px 4px",textAlign:"right",fontSize:11,color:"#999",borderBottom:"none"}}>—</td>
                                      <td style={{padding:"8px 7px 4px",textAlign:"right",fontSize:11,color:"#555",borderBottom:"none"}}>{Number(d.oldRaw||0).toLocaleString()}</td>
                                      <td style={{padding:"8px 7px 4px",textAlign:"right",fontSize:11,color:"#999",borderBottom:"none"}}>—</td>
                                      {showMachineFee && <><td style={{borderBottom:"none"}}/><td style={{borderBottom:"none"}}/><td style={{borderBottom:"none"}}/></>}
                                    </tr>
                                    <tr>
                                      <td style={{padding:"4px 7px 8px 16px",color:"#1E6B45",fontSize:11,fontWeight:"bold",borderBottom:"1px dashed #CCC"}}>↳ 新機</td>
                                      <td style={{padding:"4px 7px 8px",textAlign:"right",fontSize:11,color:"#1E6B45",borderBottom:"1px dashed #CCC"}}>{Number(d.newMachineCur||0).toLocaleString()}</td>
                                      <td style={{padding:"4px 7px 8px",textAlign:"right",fontSize:11,color:"#1E6B45",borderBottom:"1px dashed #CCC"}}>{Number(d.newMachineInit||0).toLocaleString()}</td>
                                      <td style={{padding:"4px 7px 8px",textAlign:"right",fontSize:11,color:"#1E6B45",borderBottom:"1px dashed #CCC"}}>{Number(d.newRaw||0).toLocaleString()}</td>
                                      <td style={{padding:"4px 7px 8px",textAlign:"right",fontSize:11,color:"#999",borderBottom:"1px dashed #CCC"}}>—</td>
                                      <td style={{padding:"4px 7px 8px",textAlign:"right",fontSize:11,color:"#1E6B45",borderBottom:"1px dashed #CCC"}}>{Number(d.newRaw||0).toLocaleString()}</td>
                                      <td style={{padding:"4px 7px 8px",textAlign:"right",fontSize:11,color:"#999",borderBottom:"1px dashed #CCC"}}>—</td>
                                      {showMachineFee && <><td style={{borderBottom:"1px dashed #CCC"}}/><td style={{borderBottom:"1px dashed #CCC"}}/><td style={{borderBottom:"1px dashed #CCC"}}/></>}
                                    </tr>
                                    <tr>
                                      <td style={{padding:"8px 7px",fontWeight:"bold",color:"#000",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>　{lb}（合計）</td>
                                      <td style={{padding:"8px 7px",textAlign:"right",color:"#888",fontSize:11,borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>—</td>
                                      <td style={{padding:"8px 7px",textAlign:"right",color:"#888",fontSize:11,borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>—</td>
                                      <td style={{padding:"8px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>{Number(d.raw||0).toLocaleString()}</td>
                                      <td style={{padding:"8px 7px",textAlign:"right",fontWeight:"bold",color:(Number(d.deduct)||0)>0?"#000":"#999",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>{(Number(d.deduct)||0)>0?"-"+Number(d.deduct).toLocaleString():"—"}</td>
                                      <td style={{padding:"8px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>{Number(d.actual||0).toLocaleString()}</td>
                                      <td style={{padding:"8px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>{Number(d.quota||0).toLocaleString()}</td>
                                      {showMachineFee && <td style={{padding:"8px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>{Number(d.over||0).toLocaleString()}</td>}
                                      {showMachineFee && <td style={{padding:"8px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>${d.price}</td>}
                                      {showMachineFee && <td style={{padding:"8px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"2px solid #BBB",background:"#F8F8F8"}}>{(d.fee||0)>0?"$"+Math.round(Number(d.fee)).toLocaleString():"未超印"}</td>}
                                    </tr>
                                  </React.Fragment>
                                );
                              }
                              return (
                              <tr key={lb}>
                                 <td style={{padding:"10px 7px",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{lb}</td>
                                 <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(d.current||0).toLocaleString()}</td>
                                 <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(d.prev||0).toLocaleString()}</td>
                                 <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(d.raw||0).toLocaleString()}</td>
                                 <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:(Number(d.deduct)||0)>0?"#000":"#999",borderBottom:"1px dashed #CCC"}}>{(Number(d.deduct)||0)>0?"-"+Number(d.deduct).toLocaleString():"—"}</td>
                                 <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(d.actual||0).toLocaleString()}</td>
                                 <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(d.quota||0).toLocaleString()}</td>
                                 {showMachineFee && <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(d.over||0).toLocaleString()}</td>}
                                 {showMachineFee && <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>${d.price}</td>}
                                 {showMachineFee && <td style={{padding:"10px 7px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{(d.fee||0)>0?"$"+Math.round(Number(d.fee)).toLocaleString():"未超印"}</td>}
                              </tr>
                              );
                            })}
                        </tbody>
                      </table>
                      {Number(d_col.bwConvertBonus)>0 && <div style={{border:"1px solid #000",borderRadius:4,padding:"8px 14px",fontSize:11,color:"#000",fontWeight:"bold",marginTop:hasD?8:0}}>🔄 黑白剩餘額度換算彩色：黑白剩 {Number(d_col.bwLeftoverUsed||0).toLocaleString()} 張 ÷ {Number(d_col.convRatio||0)} = 彩色 +{Number(d_col.bwConvertBonus).toLocaleString()} 張（已併入彩色總額度折抵）</div>}
                      {hasD&&<div style={{border:"1px solid #000",borderRadius:4,padding:"8px 14px",fontSize:11,color:"#000",fontWeight:"bold"}}>🔧 維修扣除：{(Number(d_bw.deduct)||0)>0&&<span style={{marginLeft:8}}>黑白 -{Number(d_bw.deduct).toLocaleString()} 張{d_bw.note?" （"+d_bw.note+"）":""}</span>}{(Number(d_col.deduct)||0)>0&&<span style={{marginLeft:8}}>彩色 -{Number(d_col.deduct).toLocaleString()} 張{d_col.note?" （"+d_col.note+"）":""}</span>}</div>}
                  </div>
               );
            };

            return (
              <div style={{fontFamily:"'新細明體', 'PMingLiU', serif",minHeight:"100vh",background:"#CCC"}}>
                <div style={{background:C.navy,padding:"12px 20px",display:"flex",gap:12,alignItems:"center",justifyContent:"space-between"}}>
                  <button onClick={()=>setPage("history")} style={{background:"none",border:"none",color:"#FFF",cursor:"pointer",fontSize:18}}>←</button>
                  <span style={{color:"#FFF",fontWeight:"bold"}}>帳單預覽</span>
                  <button style={btnS("accent")} onClick={()=>{injectPrint();setTimeout(()=>window.print(),100)}}>🖨️ 列印</button>
                </div>
                <div style={{padding:"24px 16px",display:"flex",justifyContent:"center"}}>
                  
                  <div id="print-area" style={{background:"#FFF",width:"100%",maxWidth:700,padding:"44px 52px",boxSizing:"border-box",boxShadow:"0 4px 24px rgba(0,0,0,.15)"}}>
                    
                    <div style={{borderBottom:"3px solid #000",paddingBottom:20,marginBottom:24}}>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <div><div style={{fontSize:24,fontWeight:"bold",color:"#000",letterSpacing:2}}>影印機租用費用明細</div><div style={{fontSize:11,color:"#000",marginTop:4,letterSpacing:1,fontWeight:"bold"}}>COPIER USAGE BILLING STATEMENT</div></div>
                        <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#000",fontWeight:"bold"}}>帳單日期</div><div style={{fontSize:13,color:"#000",fontWeight:"bold"}}>{new Date().toLocaleDateString("zh-TW")}</div></div>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginBottom:24,padding:"16px 20px",border:"1px solid #000",borderRadius:4}}>
                      <div><div style={{fontSize:10,letterSpacing:3,color:"#000",marginBottom:4,fontWeight:"bold"}}>客戶名稱</div><div style={{fontSize:20,fontWeight:"bold",color:"#000"}}>{r.clientName}</div></div>
                      <div>
                        <div style={{fontSize:10,letterSpacing:3,color:"#000",marginBottom:4,fontWeight:"bold"}}>計費月份 ({cycle} 個月結)</div>
                        <div style={{fontSize:15,color:"#000",fontWeight:"bold"}}>民國 {r.billingYear} 年 {r.billingMonth} 月</div>
                        {r.periodStart&&r.periodEnd&&<div style={{fontSize:11,color:"#000",marginTop:2,fontWeight:"bold"}}>{fixDate(r.periodStart)} ～ {fixDate(r.periodEnd)}</div>}
                      </div>
                    </div>
                    
                    {isSingle && r.baseRent>0 && <div style={{marginBottom:18}}><div style={{fontSize:10,letterSpacing:3,color:"#000",marginBottom:8,fontWeight:"bold"}}>基本租金 (小計)</div><table style={{width:"100%",borderCollapse:"collapse"}}><tbody><tr><td style={{padding:"12px 14px",fontWeight:"bold",color:"#000",borderTop:"2px solid #000",borderBottom:"2px solid #000"}}>基本租金費用{r.rentNote?" （"+r.rentNote+"）":""}</td><td style={{padding:"12px 14px",textAlign:"right",fontSize:16,fontWeight:"bold",color:"#000",borderTop:"2px solid #000",borderBottom:"2px solid #000"}}>${Math.round(Number(r.baseRent)).toLocaleString()}</td></tr></tbody></table></div>}
                    
                    {isSingle ? renderMachineTable({type:r.machineType, model:r.model, bw:r.bw, col:r.col, baseRent:0}, 0, true) : (r.machines||[]).map((m, idx) => renderMachineTable(m, idx, false))}

                    {!isSingle && r.multiCalcMode === "pooled" && (<>
                      <div style={{fontSize:11,letterSpacing:3,color:"#000",marginBottom:8,fontWeight:"bold"}}>超印費用合併計算</div>
                      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:14}}>
                        <thead><tr style={{borderTop:"2px solid #000", borderBottom:"2px solid #000"}}>{["計費項目","總印量","扣除張數","計費印量","本期總額度","超出張數","單價","費用"].map(h=><th key={h} style={{padding:"10px 10px",color:"#000",fontSize:12,textAlign:h==="計費項目"?"left":"right",fontWeight:"bold"}}>{h}</th>)}</tr></thead>
                        <tbody>{[{lb:"黑白列印",raw:r.totalBwRaw,deduct:r.bwDeduct,actual:r.bwActual,quota:r.bwQuota,over:r.bwOver,price:r.bwPrice,fee:r.bwFee},{lb:"彩色列印",raw:r.totalColRaw,deduct:r.colDeduct,actual:r.colActual,quota:r.colQuota,over:r.colOver,price:r.colPrice,fee:r.colFee}].map(({lb,raw,deduct,actual,quota,over,price,fee},i)=>(
                          <tr key={lb}>
                            <td style={{padding:"10px",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{lb}</td>
                            <td style={{padding:"10px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(raw||0).toLocaleString()}</td>
                            <td style={{padding:"10px",textAlign:"right",fontWeight:"bold",color:(Number(deduct)||0)>0?"#000":"#999",borderBottom:"1px dashed #CCC"}}>{(Number(deduct)||0)>0?"-"+Number(deduct).toLocaleString():"—"}</td>
                            <td style={{padding:"10px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(actual||0).toLocaleString()}</td>
                            <td style={{padding:"10px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(quota||0).toLocaleString()}</td>
                            <td style={{padding:"10px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{Number(over||0).toLocaleString()}</td>
                            <td style={{padding:"10px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>${price}</td>
                            <td style={{padding:"10px",textAlign:"right",fontWeight:"bold",color:"#000",borderBottom:"1px dashed #CCC"}}>{(fee||0)>0?"$"+Math.round(Number(fee)).toLocaleString():"未超印"}</td>
                          </tr>
                        ))}</tbody>
                      </table>
                      {Number(r.multiColConvBonus)>0 && <div style={{border:"1px solid #000",borderRadius:4,padding:"8px 14px",fontSize:11,color:"#000",fontWeight:"bold",marginBottom:14}}>🔄 黑白剩餘額度換算彩色（{r.bw2colMultiMode==="pooled"?"全部併計":"各台合計"}）：黑白剩 {Number(r.multiColConvBonus*(Number(r.bw2colRatio)||10)).toLocaleString()} 張 ÷ {Number(r.bw2colRatio)||10} = 彩色 +{Number(r.multiColConvBonus).toLocaleString()} 張（已併入彩色總額度）</div>}
                    </>)}

                    <div style={{borderTop:"3px solid #000",paddingTop:16,marginTop:20}}>
                      <div style={{display:"flex",justifyContent:"flex-end",gap:24,marginBottom:5,fontSize:13,color:"#000",fontWeight:"bold"}}>
                          <span>週期租金總計 ({rentCycle}個月) {r.taxMode==="內含"?"(內含稅)":r.taxMode==="外加"?"(未稅)":""}</span>
                          <span style={{minWidth:90,textAlign:"right"}}>${Math.round(gRent).toLocaleString()}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"flex-end",gap:24,marginBottom:5,fontSize:13,color:"#000",fontWeight:"bold"}}>
                          <span>本期超印費用總計 {r.overageTaxMode==="內含"?"(內含稅)":r.overageTaxMode==="外加"?"(未稅)":""}</span>
                          <span style={{minWidth:90,textAlign:"right"}}>${Math.round(gOverage).toLocaleString()}</span>
                      </div>
                      
                      {(r.taxMode==="外加" || r.overageTaxMode==="外加") && (
                         <div style={{display:"flex",justifyContent:"flex-end",gap:24,marginBottom:5,fontSize:13,color:"#000",fontWeight:"bold"}}>
                            <span>外加營業稅 (5%) <span style={{fontSize:11, color:C.muted, marginLeft:4, fontWeight:"normal"}}>[租金:{r.taxMode==="內含"?"內含":r.taxMode} / 超印:{r.overageTaxMode==="內含"?"內含":r.overageTaxMode}]</span></span>
                            <span style={{minWidth:90,textAlign:"right"}}>${Math.round((rentTaxAmount || 0) + (overageTaxAmount || 0)).toLocaleString()}</span>
                         </div>
                      )}

                      <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:24, marginTop: 10, borderTop: (r.taxMode==="外加"||r.overageTaxMode==="外加")?"1px solid #000":"none", paddingTop: (r.taxMode==="外加"||r.overageTaxMode==="外加")?10:0}}>
                        <span style={{fontSize:13,color:"#000",letterSpacing:2,fontWeight:"bold"}}>本期總計應收（新台幣）</span>
                        <span style={{fontSize:32,fontWeight:"bold",color:"#000"}}>${Math.round(Number(r.total)).toLocaleString()}</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          }
          
          return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:monospace;color:red"><h2>⚠️ JavaScript 執行錯誤</h2><pre>' + msg + '\n行號: ' + line + '\n' + (err ? err.stack : '') + '</pre></div>';
      };
    </script>
</body>
</html>
